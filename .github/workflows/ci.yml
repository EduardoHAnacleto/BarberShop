name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Code Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # .NET Setup
      # =========================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # =========================
      # Dependency
      # =========================
      - name: Restore
        run: dotnet restore BarberShop.slnx

      # =========================
      # Build
      # =========================
      - name: Build
        run: dotnet build BarberShop.slnx --no-restore --configuration Release

      # =========================
      # Tests with coverage
      # =========================
      - name: Test
        run: dotnet test BarberShop.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      # =========================
      # Publish test coverage
      # =========================
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage
