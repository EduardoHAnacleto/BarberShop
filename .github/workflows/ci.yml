name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Code Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # .NET Setup
      # =========================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # =========================
      # Dependency
      # =========================
      - name: Restore
        run: dotnet restore BarberShop.slnx

      # =========================
      # Build
      # =========================
      - name: Build
        run: dotnet build BarberShop.slnx --no-restore --configuration Release

      # =========================
      # Tests with coverage
      # =========================
      - name: Test
        run: |
          dotnet test BarberShop.slnx \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[BarberShop.API]BarberShop.API.Hubs.*,[BarberShop.Application]BarberShop.Application.DTOs.*,[BarberShop.Domain]BarberShop.Domain.Models.*,[BarberShop.Domain]BarberShop.Domain.Enums.*" \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/Program.cs,**/Migrations/**,**/Data/AppDbContext.cs" \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute="ExcludeFromCodeCoverage"

      # =========================
      # Install ReportGenerator
      # =========================
      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      # =========================
      # Generate HTML report
      # =========================
      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage/report" \
            -reporttypes:"Html;MarkdownSummaryGithub;Cobertura" \
            -title:"BarberShop Coverage Report" \
            -verbosity:Warning

      # =========================
      # Print summary to job
      # =========================
      - name: Coverage summary
        run: cat ./coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      # =========================
      # Publish HTML report
      # =========================
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/report

      # =========================
      # Publish raw XML (Cobertura)
      # =========================
      - name: Upload raw coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-cobertura
          path: ./coverage/**/coverage.cobertura.xml
