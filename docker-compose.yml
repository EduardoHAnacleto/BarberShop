services:

  # =========================
  # SQL Server
  # =========================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: barbershop-sqlserver
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "${SA_PASSWORD}",
          "-Q", "SELECT 1",
          "-C"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================
  # SQL Server Init
  # =========================
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: barbershop-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./database/schema.sql:/schema.sql
    command:
      [
      "/opt/mssql-tools18/bin/sqlcmd",
      "-S", "sqlserver",
      "-U", "sa",
      "-P", "${SA_PASSWORD}",
      "-i", "/schema.sql",
      "-C",
      "-l", "30"
      ]
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
    restart: "no"

  # =========================
  # Redis
  # =========================
  redis:
    image: redis:7-alpine
    container_name: barbershop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================
  # API
  # =========================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barbershop-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=barbershop;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpiresInMinutes=${JWT_EXPIRES_IN_MINUTES}
      - OpenTelemetry__OtlpEndpoint=http://tempo:4317
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # =========================
  # Prometheus
  # =========================
  prometheus:
    image: prom/prometheus:latest
    container_name: barbershop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
    restart: unless-stopped

  # =========================
  # Loki
  # =========================
  loki:
    image: grafana/loki:latest
    container_name: barbershop-loki
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/var/loki
    command: -config.file=/etc/loki/loki.yml
    restart: unless-stopped

  # =========================
  # Tempo
  # =========================
  tempo:
    image: grafana/tempo:latest
    container_name: barbershop-tempo
    user: "0"
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo.yml
    restart: unless-stopped

  # =========================
  # Grafana
  # =========================
  grafana:
    image: grafana/grafana:latest
    container_name: barbershop-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
volumes:
  sqlserver_data:
  redis_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data: